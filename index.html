<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vlog快剪">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>Vlog快剪 — 一键模板剪辑</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--accent:#e94560;
  --accent2:#0f3460;--gold:#f0a500;--text:#eee;--text2:#aaa;
  --radius:14px;--radius-sm:10px;--safe-bottom:env(safe-area-inset-bottom,16px);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);display:flex;justify-content:center;
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
.app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ===== Screen Transitions ===== */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow-y:auto;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s ease;
  padding:0 16px;padding-bottom:var(--safe-bottom);-webkit-overflow-scrolling:touch;
}
.screen.hidden-right{transform:translateX(110%);opacity:0}
.screen.hidden-left{transform:translateX(-30%);opacity:0}
.screen.active{transform:translateX(0);opacity:1}

/* ===== Header ===== */
.header{padding:20px 0 12px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;background:var(--bg)}
.header .back{width:36px;height:36px;border-radius:50%;background:var(--card);border:none;color:var(--text);
  font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.header h1{font-size:20px;font-weight:700}
.header .badge{font-size:11px;background:var(--accent);color:#fff;padding:3px 8px;border-radius:20px;margin-left:auto}

/* ===== Upload Zone ===== */
.upload-zone{border:2px dashed var(--card2);border-radius:var(--radius);padding:32px 20px;
  text-align:center;cursor:pointer;transition:all .2s;margin:8px 0 16px}
.upload-zone:active,.upload-zone.drag{border-color:var(--accent);background:rgba(233,69,96,.06)}
.upload-zone .icon{font-size:44px;margin-bottom:8px}
.upload-zone .title{font-size:16px;font-weight:600;margin-bottom:4px}
.upload-zone .hint{font-size:12px;color:var(--text2)}
.upload-zone input{display:none}

/* ===== Style Grid ===== */
.section-title{font-size:14px;font-weight:600;color:var(--text2);margin:4px 0 10px;display:flex;align-items:center;gap:6px}
.style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.style-card{background:var(--card);border-radius:var(--radius-sm);padding:14px 8px;text-align:center;
  cursor:pointer;border:2px solid transparent;transition:all .2s}
.style-card:active{transform:scale(.96)}
.style-card.selected{border-color:var(--accent);background:rgba(233,69,96,.1)}
.style-card .emoji{font-size:32px;margin-bottom:6px;display:block}
.style-card .name{font-size:12px;font-weight:600}
.style-card .tag{font-size:10px;color:var(--text2);margin-top:2px}

/* ===== Preview Area ===== */
.preview-box{position:relative;border-radius:var(--radius);overflow:hidden;background:#000;
  margin:8px 0 14px;aspect-ratio:9/16;max-height:60vh}
.preview-box video{width:100%;height:100%;object-fit:contain}
.preview-box canvas{position:absolute;inset:0;width:100%;height:100%}
.preview-box .overlay-text{position:absolute;bottom:80px;left:0;right:0;text-align:center;
  font-size:15px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.7);pointer-events:none;padding:0 20px}
.preview-box .empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--text2)}
.preview-box .empty-state .icon{font-size:48px;margin-bottom:8px}

/* ===== Controls ===== */
.control-row{display:flex;gap:8px;margin-bottom:10px}
.control-group{flex:1;background:var(--card);border-radius:var(--radius-sm);padding:10px 12px}
.control-group label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px}
.control-group .value{font-size:14px;font-weight:600}
.control-group input[type=range]{width:100%;margin-top:6px;accent-color:var(--accent)}

.param-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.param-chip{font-size:11px;padding:6px 12px;border-radius:20px;background:var(--card);color:var(--text2);
  border:none;cursor:pointer;white-space:nowrap;transition:all .15s}
.param-chip.active{background:var(--accent);color:#fff}
.param-chip:active{transform:scale(.95)}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;
  padding:14px 24px;transition:all .15s;width:100%}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--card);color:var(--text)}
.btn-outline{background:transparent;border:1.5px solid var(--card2);color:var(--text)}
.btn-sm{padding:8px 16px;font-size:13px;width:auto}

/* ===== Progress ===== */
.progress-wrap{background:var(--card);border-radius:100px;height:8px;overflow:hidden;margin:12px 0}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:100px;
  transition:width .3s;width:0%}
.progress-text{font-size:12px;color:var(--text2);text-align:center;margin-bottom:10px}

/* ===== Platform Tabs ===== */
.platform-tabs{display:flex;gap:8px;margin:12px 0}
.platform-tab{flex:1;padding:12px;border-radius:var(--radius-sm);text-align:center;cursor:pointer;
  background:var(--card);border:2px solid transparent;transition:all .2s}
.platform-tab.active{border-color:var(--accent);background:rgba(233,69,96,.08)}
.platform-tab .pf-name{font-size:15px;font-weight:700}
.platform-tab .pf-ratio{font-size:11px;color:var(--text2);margin-top:2px}
.platform-tab .pf-rules{font-size:10px;color:var(--gold);margin-top:2px}

/* ===== Copy Card ===== */
.copy-card{background:var(--card);border-radius:var(--radius-sm);padding:14px;margin:10px 0}
.copy-card .copy-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.copy-card .copy-label{font-size:12px;color:var(--text2)}
.copy-card .copy-text{font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap}
.copy-card .copy-btn{font-size:13px;background:none;border:1px solid var(--card2);color:var(--accent);
  padding:4px 12px;border-radius:20px;cursor:pointer}
.copy-card .tags-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.copy-card .hash-tag{font-size:11px;background:var(--card2);color:var(--accent);padding:3px 8px;border-radius:12px}

/* ===== Toast ===== */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--card);
  color:var(--text);padding:12px 24px;border-radius:100px;font-size:14px;z-index:99;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.ok{color:#4ade80}
.toast.err{color:#f87171}

/* ===== Bottom Bar ===== */
.bottom-bar{display:flex;gap:10px;padding:14px 0;padding-bottom:calc(14px + var(--safe-bottom));
  position:sticky;bottom:0;background:var(--bg)}
</style>
</head>
<body>
<div class="app" id="app">

<!-- ==================== SCREEN 0: HOME ==================== -->
<div class="screen active" id="screen-home">
  <div class="header">
    <h1>🎬 Vlog快剪</h1>
    <span class="badge">模板一键剪辑</span>
  </div>

  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📤</div>
    <div class="title">点击导入视频</div>
    <div class="hint">支持 MP4 / MOV / WebM · 本地处理不上传</div>
    <input type="file" id="fileInput" accept="video/*" onchange="onFilePicked(event)">
  </div>

  <div class="section-title">🎨 选择剪辑风格 <span style="font-size:11px;font-weight:400;margin-left:auto" id="fileName"></span></div>
  <div class="style-grid" id="styleGrid"></div>
</div>

<!-- ==================== SCREEN 1: EDIT ==================== -->
<div class="screen hidden-right" id="screen-edit">
  <div class="header">
    <button class="back" onclick="goScreen('home')">←</button>
    <h1 id="editTitle">旅行Vlog</h1>
  </div>

  <div class="preview-box" id="previewBox">
    <video id="previewVideo" loop muted playsinline></video>
    <div class="overlay-text" id="overlayText"></div>
    <div class="empty-state" id="emptyPreview">
      <div class="icon">🎥</div>
      <div>视频预览区</div>
    </div>
  </div>

  <div class="param-bar" id="speedChips">
    <button class="param-chip active" data-speed="1.0">1× 原速</button>
    <button class="param-chip" data-speed="1.2">1.2×</button>
    <button class="param-chip" data-speed="1.5">1.5×</button>
    <button class="param-chip" data-speed="0.8">0.8×</button>
    <button class="param-chip" data-speed="2.0">2×</button>
  </div>

  <div class="control-group" style="margin-bottom:10px">
    <label id="filterLabel">滤镜: 暖日</label>
    <input type="range" id="filterSlider" min="0" max="100" value="70" oninput="onFilterChange()">
  </div>

  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="progress-text" id="progressText" style="display:none"></div>

  <div class="bottom-bar">
    <button class="btn btn-secondary btn-sm" onclick="resetPreview()">↻ 重置</button>
    <button class="btn btn-primary" id="btnGenerate" onclick="startGenerate()">✨ 一键生成</button>
  </div>
</div>

<!-- ==================== SCREEN 2: EXPORT ==================== -->
<div class="screen hidden-right" id="screen-export">
  <div class="header">
    <button class="back" onclick="goScreen('edit')">←</button>
    <h1>导出视频</h1>
  </div>

  <div class="preview-box" style="aspect-ratio:auto;max-height:200px">
    <video id="exportVideo" controls playsinline style="width:100%;height:100%"></video>
  </div>

  <div class="section-title">📱 选择发布平台</div>
  <div class="platform-tabs" id="platformTabs">
    <div class="platform-tab active" data-platform="douyin" onclick="switchPlatform('douyin')">
      <div class="pf-name">🎵 抖音</div>
      <div class="pf-ratio">9:16 竖屏</div>
      <div class="pf-rules">查看审核要点</div>
    </div>
    <div class="platform-tab" data-platform="xhs" onclick="switchPlatform('xhs')">
      <div class="pf-name">📕 小红书</div>
      <div class="pf-ratio">3:4 竖屏</div>
      <div class="pf-rules">查看审核要点</div>
    </div>
  </div>

  <div class="copy-card" id="copyCard">
    <div class="copy-header">
      <span class="copy-label">📝 推荐文案</span>
      <button class="copy-btn" onclick="copyText()">📋 复制</button>
    </div>
    <div class="copy-text" id="copyText"></div>
    <div class="tags-row" id="hashTags"></div>
  </div>

  <div class="copy-card" id="rulesCard" style="border-left:3px solid var(--gold)">
    <div class="copy-label" style="margin-bottom:4px">⚠️ 平台审核要点</div>
    <div class="copy-text" id="rulesText" style="font-size:12px;color:var(--text2)"></div>
  </div>

  <div class="bottom-bar">
    <button class="btn btn-outline btn-sm" onclick="goScreen('edit')">← 返回编辑</button>
    <button class="btn btn-primary" onclick="exportVideo()">💾 保存到相册</button>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// STYLE TEMPLATES
// ============================================================
const STYLES = [
  { id:'travel', emoji:'✈️', name:'旅行Vlog', tag:'风景·游记',
    filter:'sepia(30%) saturate(120%) brightness(105%)',
    speed:1.1, text:'📍 {date} {location}', music:'warm' },
  { id:'food', emoji:'🍜', name:'美食探店', tag:'餐厅·测评',
    filter:'saturate(140%) contrast(110%) brightness(108%)',
    speed:1.2, text:'🍽️ {dish}', music:'upbeat' },
  { id:'daily', emoji:'📝', name:'日常碎碎念', tag:'生活·记录',
    filter:'brightness(105%) saturate(105%)',
    speed:1.0, text:'{date} 日常', music:'chill' },
  { id:'unbox', emoji:'📦', name:'好物开箱', tag:'测评·分享',
    filter:'brightness(115%) contrast(108%) saturate(110%)',
    speed:1.3, text:'📦 {product} 开箱', music:'pop' },
  { id:'mood', emoji:'🌙', name:'氛围感', tag:'情绪·文艺',
    filter:'saturate(70%) brightness(90%) contrast(105%)',
    speed:0.9, text:'{moodText}', music:'lofi' },
  { id:'sport', emoji:'🏃', name:'运动卡点', tag:'健身·节奏',
    filter:'contrast(120%) saturate(115%) brightness(108%)',
    speed:1.5, text:'💪 {activity}', music:'beat' },
  { id:'stall', emoji:'🛒', name:'摆摊Vlog', tag:'夜市·手工',
    filter:'sepia(25%) saturate(125%) brightness(110%) contrast(105%)',
    speed:1.2, text:'💰 {product} ¥{price}', music:'warm' },
  { id:'shop', emoji:'🏪', name:'开店创业', tag:'装修·营业',
    filter:'brightness(108%) contrast(110%) saturate(105%)',
    speed:1.0, text:'🏪 Day {day} · {milestone}', music:'inspiring' }
];

// ============================================================
// PLATFORM CONFIGS
// ============================================================
const PLATFORMS = {
  douyin: {
    name:'抖音', ratio:'9:16', aspect:9/16,
    rules:'1.禁止出现其他平台水印/logo\n2.背景音乐需使用抖音曲库(建议导出后替换)\n3.文字勿含微信号/二维码等引流信息\n4.避免医疗/金融等敏感领域断言性文案\n5.画面不得过于血腥/暴力/恐怖',
    copyTemplates: {
      travel:'说走就走的旅行🧳 这里的风景真的绝了！\n#旅行 #vlog日常 #治愈系风景',
      food:'挖到宝藏小店了！！人均50吃到撑🤤\n#美食探店 #宝藏店铺 #今天吃什么呢',
      daily:'平淡日子里的小确幸✨\n#日常vlog #生活碎片 #治愈',
      unbox:'等了三个月终于到了📦 拆给你们看！\n#开箱 #好物分享 #开箱视频',
      mood:'愿你也被这个世界温柔以待🌙\n#氛围感 #情绪短片 #治愈系',
      sport:'今日份打卡✅ 流汗的感觉太爽了\n#运动打卡 #健身日常 #自律',
      stall:'摆摊第N天📢 今天遇到好多有趣的人～\n#摆摊日记 #夜市摆摊 #副业',
      shop:'从0到1的小店，终于开业了🏪\n#开店日记 #创业vlog #我的小店'
    }
  },
  xhs: {
    name:'小红书', ratio:'3:4', aspect:3/4,
    rules:'1.图片/视频不得含竞品水印(抖/快等)\n2.文案避免过度夸大、绝对化用语("最""第一")\n3.美妆/护肤类需注意功效词合规\n4.探店类需标明是否合作/广告\n5.不得引导站外交易(微信/私域)',
    copyTemplates: {
      travel:'姐妹们！这个地方一定要来一次📍附攻略👇\n#旅行攻略 #小众旅行地 #周末去哪儿',
      food:'挖到宝了🎉 这家店我愿称之为天花板！\n#美食探店 #本地人推荐 #宝藏餐厅',
      daily:'记录生活｜今日份小美好请查收📮\n#日常plog #生活碎片 #记录生活',
      unbox:'测评来啦！这个到底值不值得买🤔\n#开箱测评 #好物推荐 #购物分享',
      mood:'氛围感拉满💫 每一帧都想截图\n#氛围感大片 #电影感 #治愈系',
      sport:'居家也能暴汗！跟练版已出🏃‍♀️\n#运动打卡 #健身教程 #宅家健身',
      stall:'摆摊真的能赚钱吗？Day N 真实记录🛒\n#摆摊创业 #副业 #摆摊日记',
      shop:'从装修到开业｜我的小店诞生记🏪\n#开店创业 #装修日记 #创业记录'
    }
  }
};

// ============================================================
// STATE
// ============================================================
let currentScreen = 'home';
let selectedStyle = null;
let videoFile = null;
let videoURL = null;
let currentSpeed = 1.0;
let currentFilter = '';
let currentPlatform = 'douyin';
let exportedBlob = null;
let isProcessing = false;

// ============================================================
// INIT
// ============================================================
function init() {
  renderStyles();
  bindSpeedChips();
}

function renderStyles() {
  const grid = document.getElementById('styleGrid');
  grid.innerHTML = STYLES.map((s,i) => `
    <div class="style-card" data-id="${s.id}" onclick="selectStyle('${s.id}')" id="sc-${s.id}">
      <span class="emoji">${s.emoji}</span>
      <div class="name">${s.name}</div>
      <div class="tag">${s.tag}</div>
    </div>
  `).join('');
}

// ============================================================
// NAVIGATION
// ============================================================
function goScreen(name) {
  if (isProcessing && name !== 'export') return;

  const screens = {
    home: document.getElementById('screen-home'),
    edit: document.getElementById('screen-edit'),
    export: document.getElementById('screen-export')
  };

  Object.entries(screens).forEach(([key, el]) => {
    if (key === name) {
      el.classList.remove('hidden-right','hidden-left');
      el.classList.add('active');
    } else if (name === 'edit' && key === 'export') {
      el.classList.add('hidden-right');
      el.classList.remove('active','hidden-left');
    } else if (name === 'export') {
      el.classList.add('hidden-left');
      el.classList.remove('active','hidden-right');
    } else if (name === 'home') {
      el.classList.add('hidden-right');
      el.classList.remove('active','hidden-left');
    }
  });

  currentScreen = name;
}

function selectStyle(id) {
  document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('sc-' + id);
  if (card) card.classList.add('selected');

  selectedStyle = STYLES.find(s => s.id === id);
  if (!selectedStyle) return;

  // Apply preset speed
  currentSpeed = selectedStyle.speed;

  // Apply preset filter
  currentFilter = selectedStyle.filter;
  document.getElementById('filterSlider').value = 70;

  // Update edit title
  document.getElementById('editTitle').textContent = selectedStyle.emoji + ' ' + selectedStyle.name;

  // Update overlay text
  document.getElementById('overlayText').textContent = selectedStyle.text;

  // Update filter label
  updateFilterLabel();

  // Apply to video if loaded
  applyVideoStyle();

  // If no video loaded yet, prompt
  if (!videoURL) {
    showToast('请先导入视频', 'err');
    setTimeout(() => document.getElementById('uploadZone').scrollIntoView({behavior:'smooth'}), 300);
    return;
  }

  // Go to edit screen
  goScreen('edit');
  updateSpeedChips();
  applyVideoStyle();
}

// ============================================================
// FILE IMPORT
// ============================================================
function onFilePicked(e) {
  const file = e.target.files[0];
  if (!file) return;

  videoFile = file;
  if (videoURL) URL.revokeObjectURL(videoURL);
  videoURL = URL.createObjectURL(file);

  document.getElementById('fileName').textContent = '📁 ' + file.name;

  const video = document.getElementById('previewVideo');
  video.src = videoURL;
  video.load();

  // Hide empty state when video loads
  video.onloadeddata = () => {
    document.getElementById('emptyPreview').style.display = 'none';
    video.style.display = 'block';
    if (videoURL) video.play().catch(()=>{});
  };

  showToast('✅ 视频已导入', 'ok');

  // If style already selected, go directly to edit
  if (selectedStyle) {
    updateSpeedChips();
    applyVideoStyle();
    goScreen('edit');
  }
}

// ============================================================
// VIDEO STYLE
// ============================================================
function applyVideoStyle() {
  const video = document.getElementById('previewVideo');
  if (!video.src) return;

  video.style.filter = currentFilter;
  video.playbackRate = currentSpeed;

  // Update overlay
  const overlay = document.getElementById('overlayText');
  const style = selectedStyle || STYLES[0];
  overlay.textContent = style.text
    .replace('{date}', new Date().toLocaleDateString('zh-CN'))
    .replace('{location}', '打卡点')
    .replace('{dish}', '招牌菜')
    .replace('{product}', '好物')
    .replace('{moodText}', '愿风裁取每一粒尘埃')
    .replace('{activity}', '今日运动')
    .replace('{day}', '1')
    .replace('{milestone}', '装修中')
    .replace('{price}', '9.9');
}

function onFilterChange() {
  const val = document.getElementById('filterSlider').value;
  updateFilterLabel();
  if (selectedStyle) {
    // Adjust filter intensity based on slider
    const base = selectedStyle.filter;
    // Scale saturate/contrast/brightness by slider (50% = base, 100% = base*1.6)
    const scale = 0.5 + (val / 100) * 1.1;
    currentFilter = base.replace(/saturate\((\d+)%\)/g, (_,v) => `saturate(${Math.round(v*scale)}%)`)
      .replace(/contrast\((\d+)%\)/g, (_,v) => `contrast(${Math.round(v*scale)}%)`)
      .replace(/brightness\((\d+)%\)/g, (_,v) => `brightness(${Math.round(v*scale)}%)`);
  }
  applyVideoStyle();
}

function updateFilterLabel() {
  const val = parseInt(document.getElementById('filterSlider').value);
  let label = '滤镜强度: ';
  if (val < 30) label += '淡雅';
  else if (val < 60) label += '自然';
  else if (val < 85) label += '浓郁';
  else label += '强烈';
  document.getElementById('filterLabel').textContent = label;
}

// ============================================================
// SPEED CHIPS
// ============================================================
function bindSpeedChips() {
  document.getElementById('speedChips').addEventListener('click', e => {
    const chip = e.target.closest('.param-chip');
    if (!chip) return;
    document.querySelectorAll('#speedChips .param-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentSpeed = parseFloat(chip.dataset.speed);
    applyVideoStyle();
  });
}

function updateSpeedChips() {
  document.querySelectorAll('#speedChips .param-chip').forEach(c => {
    c.classList.toggle('active', Math.abs(parseFloat(c.dataset.speed) - currentSpeed) < 0.01);
  });
}

// ============================================================
// GENERATE (Canvas + MediaRecorder)
// ============================================================
async function startGenerate() {
  const video = document.getElementById('previewVideo');
  if (!video.src) { showToast('请先导入视频', 'err'); return; }
  if (!selectedStyle) { showToast('请先选择风格', 'err'); return; }

  video.pause();
  video.currentTime = 0;

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  // Calculate output dimensions based on platform aspect ratio
  const platform = PLATFORMS[currentPlatform];
  const outputWidth = 1080;
  const outputHeight = Math.round(outputWidth / platform.aspect);
  canvas.width = outputWidth;
  canvas.height = outputHeight;

  // Show progress
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressText').style.display = 'block';
  document.getElementById('btnGenerate').disabled = true;
  document.getElementById('btnGenerate').textContent = '⏳ 生成中...';
  isProcessing = true;

  const stream = canvas.captureStream(30);
  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ? 'video/webm;codecs=vp9' : 'video/webm';
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 5000000 });
  const chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    exportedBlob = new Blob(chunks, { type: 'video/webm' });
    const url = URL.createObjectURL(exportedBlob);
    document.getElementById('exportVideo').src = url;
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('progressText').style.display = 'none';
    document.getElementById('btnGenerate').disabled = false;
    document.getElementById('btnGenerate').textContent = '✨ 一键生成';
    isProcessing = false;
    updateExportScreen();
    goScreen('export');
    showToast('✅ 生成完成！', 'ok');
  };

  recorder.start();

  // Process frames
  const duration = video.duration;
  const fps = 30;
  const totalFrames = Math.ceil(duration * fps);
  let frame = 0;
  const startTime = performance.now();

  // Apply filter via ctx
  function drawFrame() {
    if (video.ended || video.paused) {
      // Restart loop
      video.currentTime = 0;
      video.play().catch(() => {
        recorder.stop();
        return;
      });
      return;
    }

    const progress = video.currentTime / duration;
    frame++;

    // Clear and draw background (letterbox if needed)
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, outputWidth, outputHeight);

    // Draw video centered, cropped to aspect ratio
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const targetRatio = outputWidth / outputHeight;
    const sourceRatio = vw / vh;

    let sx, sy, sw, sh;
    if (sourceRatio > targetRatio) {
      // Video wider — crop sides
      sh = vh;
      sw = vh * targetRatio;
      sx = (vw - sw) / 2;
      sy = 0;
    } else {
      // Video taller — crop top/bottom
      sw = vw;
      sh = vw / targetRatio;
      sx = 0;
      sy = (vh - sh) / 2;
    }

    // Apply filter via CSS to video, then draw
    ctx.save();
    ctx.filter = currentFilter || 'none';
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, outputWidth, outputHeight);
    ctx.restore();

    // Draw overlay text
    if (selectedStyle) {
      const text = selectedStyle.text
        .replace('{date}', new Date().toLocaleDateString('zh-CN'))
        .replace('{location}', '打卡点')
        .replace('{dish}', '招牌菜')
        .replace('{product}', '好物')
        .replace('{moodText}', '愿风裁取每一粒尘埃')
        .replace('{activity}', '今日运动')
        .replace('{day}', '1')
        .replace('{milestone}', '装修中')
        .replace('{price}', '9.9');

      ctx.save();
      ctx.filter = 'none';
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      const fontSize = Math.round(outputWidth * 0.045);
      ctx.font = `bold ${fontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
      const textW = ctx.measureText(text).width;
      const tx = (outputWidth - textW) / 2;
      const ty = outputHeight * 0.88;
      const padding = fontSize * 0.5;
      ctx.fillRect(tx - padding, ty - fontSize, textW + padding * 2, fontSize * 1.6);
      ctx.fillStyle = '#fff';
      ctx.fillText(text, tx, ty);
      ctx.restore();
    }

    // Update progress
    if (frame % 5 === 0) {
      const pct = Math.min(100, Math.round(progress * 100));
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent =
        `处理中... ${pct}% (${Math.round(video.currentTime)}s / ${Math.round(duration)}s)`;
    }

    requestAnimationFrame(drawFrame);
  }

  video.currentTime = 0;
  video.playbackRate = currentSpeed;
  await video.play();
  drawFrame();
}

function resetPreview() {
  const video = document.getElementById('previewVideo');
  video.pause();
  video.currentTime = 0;
  if (selectedStyle) {
    currentSpeed = selectedStyle.speed;
    currentFilter = selectedStyle.filter;
    document.getElementById('filterSlider').value = 70;
    updateFilterLabel();
    updateSpeedChips();
    applyVideoStyle();
  }
  video.play().catch(()=>{});
  showToast('🔄 已重置', 'ok');
}

// ============================================================
// EXPORT
// ============================================================
function switchPlatform(pf) {
  currentPlatform = pf;
  document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-platform="${pf}"]`).classList.add('active');
  updateExportScreen();
}

function updateExportScreen() {
  const pf = PLATFORMS[currentPlatform];
  const styleId = selectedStyle ? selectedStyle.id : 'daily';
  const copyTemplate = pf.copyTemplates[styleId] || pf.copyTemplates.daily;

  document.getElementById('copyText').textContent = copyTemplate;

  // Generate hashtags from copy
  const tags = copyTemplate.match(/#[\u4e00-\u9fa5\w]+/g) || [];
  document.getElementById('hashTags').innerHTML = tags.map(t =>
    `<span class="hash-tag">${t}</span>`
  ).join('');

  document.getElementById('rulesText').textContent = pf.rules;
}

function copyText() {
  const text = document.getElementById('copyText').textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 文案已复制', 'ok'));
  } else {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('📋 文案已复制', 'ok');
  }
}

function exportVideo() {
  if (!exportedBlob) { showToast('请先生成视频', 'err'); return; }

  const ext = 'webm';
  const filename = `vlog_${selectedStyle ? selectedStyle.id : 'clip'}_${Date.now()}.${ext}`;

  // Try Web Share API first (iOS Safari supports sharing to Photos)
  const file = new File([exportedBlob], filename, { type: 'video/webm' });
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({
      files: [file],
      title: 'Vlog快剪导出',
    }).then(() => showToast('✅ 已分享，可选择保存到相册', 'ok'))
      .catch(() => downloadFallback());
  } else {
    downloadFallback();
  }

  function downloadFallback() {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(exportedBlob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast('💾 已下载，请到文件App中查看', 'ok');
  }
}

// ============================================================
// TOAST
// ============================================================
let toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ============================================================
// BOOT
// ============================================================
init();
</script>
